      <stop offset="0" stop-color="#1577d4"/>
      <stop offset="1" stop-color="#063a70"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
