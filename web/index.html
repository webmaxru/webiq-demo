    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Web IQ Sandbox",
        "url": "https://webiq.isainative.dev/",
        "description": "An interactive developer sandbox for Microsoft Web IQ — the AI-native grounding APIs. Explore live web, news, image, video, browse, and classic search with raw JSON, copy-paste SDK code, and latency telemetry.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": {
          "@type": "Person",
          "name": "Maxim Salnikov",
          "url": "https://www.linkedin.com/in/webmax"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply the persisted (or OS-preferred) theme before paint to avoid a flash.
      (function () {
        try {
          var stored = window.localStorage.getItem('webiq-theme');
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
    <noscript>
      Web IQ Sandbox is an interactive playground for Microsoft Web IQ grounding APIs (web,
      news, images, video, browse, and classic search). Please enable JavaScript to use it.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
